<!DOCTYPE html>
<html>
<head>
<title>Tender Detail For Test</title>
</head>
<body>

<!-- Case 1: Fixed Amount -->
<table class="tender-detail" id="case1">
    <tr>
        <th>是否須繳納押標金</th>
        <td>
            是 <br>
            押標金額度：新臺幣 50,000元
        </td>
    </tr>
</table>

<!-- Case 2: Percentage -->
<table class="tender-detail" id="case2">
    <tr>
        <th>是否須繳納押標金</th>
        <td>
            是 <br>
            押標金額度：標價之5%
        </td>
    </tr>
</table>

<!-- Case 3: No -->
<table class="tender-detail" id="case3">
    <tr>
        <th>是否須繳納押標金</th>
        <td>否</td>
    </tr>
</table>

<!-- Case 4: See Price List -->
<table class="tender-detail" id="case4">
    <tr>
        <th>是否須繳納押標金</th>
        <td>
            是 <br>
            押標金額度：詳實價單
        </td>
    </tr>
</table>

<!-- Case 5: Percentage with online payment fee -->
<table class="tender-detail" id="case5">
    <tr>
        <th>是否須繳納押標金</th>
        <td>
            是，且提供廠商線上繳納押標金 <br>
            押標金額度：標價之一定比率：按廠商報價總金額百分之3繳交。<br>
            廠商線上繳納押標金手續費：10元
        </td>
    </tr>
</table>

</body>
</html>
